<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>気分で選ばない読書地図 – すやネコ文庫</title>
<meta name="description" content="気分に頼らず、客観指標で読みたい本を探す『読書地図』。作品カードやデータへの入り口。">
<style>
  :root{
    --bg:#182a54; --bg-mid:#25406f; --paper:rgba(255,250,240,.12); --card:rgba(15,28,62,.9);
    --ink:#fffaf0; --sub:#d7e2f6; --line:rgba(220,232,255,.28); --btnbg:rgba(255,250,240,.12);
    --book-w:168px;
    --obi-color:rgba(255,244,198,.58); --obi-thick:8px; --obi-bottom:18px;
    --accent:#fff4c6; --accent-soft:rgba(255,244,198,.16); --gold:#f0d99b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 78% 8%, rgba(255,229,160,.28), transparent 15rem),
      radial-gradient(circle at 18% 16%, rgba(178,207,255,.24), transparent 14rem),
      radial-gradient(circle at 52% 0%, rgba(255,250,240,.12), transparent 18rem),
      linear-gradient(180deg,#20396a 0%,var(--bg-mid) 48%,var(--bg) 100%);
    line-height:1.75;
  }
  body:before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.68) 0 1px, transparent 1.8px),
      radial-gradient(circle, rgba(255,244,198,.56) 0 1.2px, transparent 2.2px);
    background-position:18px 22px,82px 54px;
    background-size:96px 96px,141px 141px;
    opacity:.18;
  }
  a{color:inherit}
  header{padding:0 16px 28px;background:linear-gradient(180deg,rgba(21,38,78,.92) 0%,rgba(37,64,111,.76) 74%,transparent 100%)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px}
  .site-nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 0;color:var(--sub);font-size:.92rem}
  .brand{font-family:Georgia,"Times New Roman",serif;letter-spacing:.08em;color:var(--accent);text-decoration:none;font-weight:700}
  .nav-links{display:flex;flex-wrap:wrap;gap:14px}
  .nav-links a{color:var(--sub);text-decoration:none;border-bottom:1px solid transparent}
  .nav-links a:hover{border-bottom-color:var(--accent)}
  .hero-panel{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(240px,.92fr);gap:26px;align-items:center;padding:34px 0 22px}
  .eyebrow{margin:0 0 10px;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase}
  h1{margin:0 0 12px;font-size:clamp(1.85rem,4vw,3.15rem);line-height:1.15;letter-spacing:.04em;font-weight:800}
  .tagline{max-width:42em;margin:0;color:var(--sub)}
  .hero{margin-top:24px;display:flex;flex-wrap:wrap;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:.45em;padding:11px 16px;border-radius:999px;border:1px solid var(--line);background:var(--btnbg);color:var(--ink);text-decoration:none;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.12) inset}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#17203c}
  .hero-visual{position:relative;min-height:250px;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at 68% 24%,rgba(255,244,198,.72) 0 28px,rgba(255,244,198,.22) 29px 76px,transparent 77px),linear-gradient(145deg,rgba(255,250,240,.16),rgba(56,83,140,.30));overflow:hidden;box-shadow:0 24px 58px rgba(0,0,0,.22)}
  .hero-visual:before{content:"";position:absolute;left:17%;right:17%;bottom:34px;height:132px;background:repeating-linear-gradient(180deg,transparent 0 18px,rgba(255,250,240,.16) 18px 20px),linear-gradient(120deg,transparent 0 45%,rgba(255,244,198,.2) 46% 54%,transparent 55%);transform:skewX(-14deg);border-bottom:8px solid rgba(255,244,198,.24)}
  .hero-visual:after{content:"READING MAP";position:absolute;right:22px;bottom:18px;color:rgba(255,250,240,.38);font-family:Georgia,"Times New Roman",serif;font-size:.78rem;letter-spacing:.2em}
  main{padding:22px 0 34px}
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:34px}
  .info-card{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:22px 22px 20px;box-shadow:0 14px 34px rgba(0,0,0,.14)}
  .info-card .num{display:block;margin:0 0 10px;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:.96rem;letter-spacing:.18em}
  .info-card h3{margin:0 0 8px;font-size:1.18rem;color:var(--ink)}
  .info-card p{margin:0;color:var(--sub)}
  .work-map{padding:2px 0 0}
  .section-kicker{margin:0 0 6px;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase}
  .works-title{position:relative;display:flex;align-items:center;gap:10px;margin:0 0 8px;font-size:clamp(1.55rem,3vw,2.1rem);color:var(--ink);letter-spacing:.03em}
  .works-title:before{content:"*";display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--accent-soft);font-size:1.1rem;line-height:1;color:var(--accent);border:1px solid var(--line)}
  .works-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}
  .works-note{margin:0 0 20px;color:var(--sub);font-size:.96rem}
  .author-section{margin:0 0 28px;padding:20px 0 28px;border-top:1px solid var(--line)}
  .author-section:last-child{border-bottom:1px solid var(--line)}
  .author-heading{display:inline-flex;align-items:center;gap:8px;margin:0 0 16px;padding:6px 13px;border-radius:999px;background:rgba(255,250,240,.12);border:1px solid var(--line);color:var(--accent);font-size:1rem;font-weight:800;letter-spacing:.12em;box-shadow:0 8px 22px rgba(0,0,0,.10)}
  .author-heading:before{content:"◇";font-size:.8rem;color:var(--gold)}

  /* 表紙カード */
  .books{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--book-w),var(--book-w)));gap:32px 28px;align-items:start;justify-content:start}
  .book{position:relative;display:block;width:var(--book-w);min-height:176px;text-decoration:none;color:inherit;background:linear-gradient(90deg,rgba(255,244,198,.16) 0 9px,var(--card) 9px);border:1.5px solid var(--line);border-radius:12px;padding:16px 13px 26px 18px;box-shadow:0 14px 30px rgba(0,0,0,.22),0 0 0 1px rgba(255,250,240,.03) inset;transition:transform .12s ease,box-shadow .12s ease,background .2s;overflow:hidden}
  .book:before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:rgba(255,244,198,.22);z-index:3}
  .book:hover{transform:translateY(-3px);box-shadow:0 18px 34px rgba(0,0,0,.3),0 0 18px rgba(255,244,198,.08)}
  .book .book-text{position:relative;z-index:2}
  .book .genre-image{display:block;width:100%;aspect-ratio:1 / 1;object-fit:cover;border-radius:10px;margin:0 0 10px;border:1px solid rgba(255,250,240,.18);box-shadow:0 8px 18px rgba(0,0,0,.22)}
  .book.has-cover{aspect-ratio:3 / 4;min-height:0;padding:0;background:#0a1430;border:1.5px solid rgba(255,244,198,.48);border-radius:13px;box-shadow:8px 7px 0 -1px rgba(218,205,174,.38),12px 11px 0 -3px rgba(35,43,66,.34),0 18px 18px -18px rgba(4,10,24,.40),0 0 0 1px rgba(255,250,240,.17) inset;transform-origin:50% 100%;overflow:visible;z-index:0}
  .book.has-cover:before{left:0;width:13px;background:linear-gradient(180deg,rgba(255,250,220,.50),rgba(19,32,70,.94));box-shadow:1px 0 0 rgba(255,250,240,.34),7px 0 18px rgba(0,0,0,.28);z-index:4}
  .book.has-cover:after{content:"";position:absolute;inset:0;z-index:2;border-radius:inherit;background:linear-gradient(180deg,rgba(6,13,30,.82) 0%,rgba(7,17,38,.64) 24%,rgba(7,17,38,.24) 48%,rgba(7,17,38,.10) 72%,rgba(6,13,30,.16) 100%),linear-gradient(90deg,rgba(0,0,0,.25) 0 14px,transparent 40px);pointer-events:none}
  .book.has-cover .genre-image{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:auto;object-fit:cover;border:0;border-radius:12px;margin:0;box-shadow:none;transition:transform .18s ease;z-index:1}
  .book.has-cover:hover{transform:translateY(-4px);box-shadow:9px 8px 0 -1px rgba(218,205,174,.42),14px 13px 0 -3px rgba(35,43,66,.38),0 20px 20px -18px rgba(4,10,24,.46),0 0 0 1px rgba(255,250,240,.20) inset}
  .book.has-cover:hover .genre-image{transform:scale(1.025)}
  .book.has-cover .book-text{position:absolute;left:18px;right:12px;top:0;bottom:auto;padding:13px 0 48px;z-index:3}
  .book.has-cover .obi{display:block;position:absolute;left:7%;right:4%;bottom:-22px;height:24px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(3,9,24,.52) 0%,rgba(3,9,24,.38) 34%,rgba(3,9,24,.17) 62%,transparent 80%);filter:blur(1px);z-index:-1;pointer-events:none}
  .book .title{font-weight:800;font-size:1rem;line-height:1.35;margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .book .author{color:var(--sub);font-size:.9rem;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book.has-cover .title{font-size:1.18rem;line-height:1.28;color:#fffaf0;text-shadow:0 2px 12px rgba(0,0,0,.82),0 0 12px rgba(0,0,0,.48)}
  .book.has-cover .author{color:rgba(255,250,240,.90);font-size:.96rem;text-shadow:0 1px 9px rgba(0,0,0,.82)}
  .book .obi{position:absolute;left:20px;right:12px;bottom:var(--obi-bottom);height:var(--obi-thick);background:var(--obi-color)}
  .book.empty{pointer-events:none}
  .load-error{color:#ffd1d1;margin:0}
  footer{padding:28px 16px;color:rgba(255,250,240,.72);border-top:1px solid var(--line)}

  @media (max-width:760px){
    .site-nav{align-items:flex-start;flex-direction:column}
    .hero-panel{grid-template-columns:1fr;padding-top:22px}
    .hero-visual{min-height:180px}
    .books{grid-template-columns:repeat(auto-fill,minmax(145px,145px));gap:30px 22px}
    .book{width:145px}
    .book.has-cover .title{font-size:1.12rem}
    .book.has-cover .author{font-size:.92rem}
  }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <nav class="site-nav" aria-label="サイト内ナビゲーション">
        <a class="brand" href="https://esortseld.github.io/suyaneko_bunko/">Suyaneko Bunko</a>
        <div class="nav-links">
          <a href="./">読書地図</a>
          <a href="https://esortseld.github.io/suyaneko_bunko/">すやネコ文庫</a>
          <a href="https://esortseld.github.io/suyaneko_yomikikase/">すやネコ朗読</a>
        </div>
      </nav>

      <div class="hero-panel">
        <div>
          <p class="eyebrow">Reading Map</p>
          <h1>気分で選ばない読書地図</h1>
          <p class="tagline">ページ数・語り・時代・地域など、気分ではなく“情報”を手がかりに本を探す小さなカタログ。</p>
          <div class="hero">
            <span class="btn primary" aria-current="page">作者名から探す</span>
            <a class="btn" href="https://esortseld.github.io/suyaneko_bunko/">すやネコ文庫へ</a>
          </div>
        </div>
        <div class="hero-visual" aria-label="本の階段をイメージした装飾"></div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="info-grid">
      <article class="info-card">
        <span class="num">01</span>
        <h3>読書地図とは</h3>
        <p>客観データ（刊行年・出版社・語り／構造など）で本を探せるように整理しています。</p>
      </article>
      <article class="info-card">
        <span class="num">02</span>
        <h3>作品カード</h3>
        <p>作品ごとの情報と、読書中に見返せる登場人物MAPをまとめます。</p>
      </article>
    </section>

    <section id="author-map" class="work-map" aria-label="作者名から本を見つける地図">
      <p class="section-kicker">Catalog</p>
      <h2 class="works-title">作者名から本を見つける地図</h2>
      <p class="works-note">作者名を手がかりに、次に読む一冊を探します。</p>
      <div id="books"></div>
    </section>
  </main>

  <footer><div class="wrap"><small>© すやネコ文庫 / Reading Map</small></div></footer>

  <!-- CSV読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" crossorigin="anonymous"></script>
  <script>
    const CSV_URL = 'data/works.csv';
    const GENRE_IMAGES = {
      '1005RIV01': {
        src: 'https://esortseld.github.io/suyaneko_bunko/assets/ditective.png',
        alt: '青い夜空と本、ランタン、虫眼鏡のミステリー画像'
      }
    };

    // 列名のゆれ対応（slugは英数字のみを想定）
    const ALIAS = {
      slug:       ['slug','Slug','SLUG'],
      title:      ['title','作品名','書名'],
      author:     ['author','作者','著者'],
      authorYomi: ['author_yomi','作者名よみ','作者よみ','著者名よみ','著者よみ','作者名よみデータ整理用']
    };
    const pick = (row, keys) => {
      for (const k of keys) {
        const v = row[k];
        if (v !== undefined && String(v).trim() !== '') return String(v).trim();
      }
      return '';
    };
    // 英数字以外を除去して正規化（保険）
    const cleanSlug = s => String(s).replace(/[^A-Za-z0-9]/g,'').trim();
    const toHiragana = s => String(s).replace(/[\u30a1-\u30f3]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    const groupOf = yomi => {
      const first = toHiragana(yomi).charAt(0);
      if ('あいうえお'.includes(first)) return 'あいうえお';
      if ('かきくけこがぎぐげご'.includes(first)) return 'かきくけこ';
      if ('さしすせそざじずぜぞ'.includes(first)) return 'さしすせそ';
      if ('たちつてとだぢづでど'.includes(first)) return 'たちつてと';
      if ('なにぬねの'.includes(first)) return 'なにぬねの';
      if ('はひふへほばびぶべぼぱぴぷぺぽ'.includes(first)) return 'はひふへほ';
      if ('まみむめも'.includes(first)) return 'まみむめも';
      if ('やゆよ'.includes(first)) return 'やゆよ';
      if ('らりるれろ'.includes(first)) return 'らりるれろ';
      if ('わをん'.includes(first)) return 'わをん';
      return 'その他';
    };
    const GROUPS = ['あいうえお','かきくけこ','さしすせそ','たちつてと','なにぬねの','はひふへほ','まみむめも','やゆよ','らりるれろ','わをん','その他'];

    const makeBook = it => {
      const a = document.createElement('a');
      const genreImage = GENRE_IMAGES[it.slug];
      a.className = genreImage ? 'book has-cover' : 'book';
      a.href = `works/${it.slug}.html`;
      const imageHtml = genreImage
        ? `<img class="genre-image" src="${genreImage.src}" alt="${genreImage.alt}" loading="lazy">`
        : '';
      a.innerHTML = `
        ${imageHtml}
        <div class="book-text">
          <div class="title">${it.title}</div>
          <div class="author">${it.author}</div>
        </div>
        <div class="obi"></div>
      `;
      return a;
    };

    Papa.parse(CSV_URL, {
      download:true, header:true, skipEmptyLines:true, encoding:'utf-8',
      complete: ({data})=>{
        const items = data.map(r=>({
          slug:       cleanSlug(pick(r, ALIAS.slug)),
          title:      pick(r, ALIAS.title),
          author:     pick(r, ALIAS.author),
          authorYomi: pick(r, ALIAS.authorYomi) || pick(r, ALIAS.author)
        })).filter(x => x.slug && x.title && x.author);

        items.sort((a,b)=>{
          const yomiCompare = a.authorYomi.localeCompare(b.authorYomi, 'ja');
          if (yomiCompare !== 0) return yomiCompare;
          return a.title.localeCompare(b.title, 'ja');
        });

        const wrap = document.getElementById('books');
        const frag = document.createDocumentFragment();

        GROUPS.forEach(groupName => {
          const groupItems = items.filter(it => groupOf(it.authorYomi) === groupName);
          if (!groupItems.length) return;

          const section = document.createElement('section');
          section.className = 'author-section';
          section.innerHTML = `<h3 class="author-heading">${groupName}</h3>`;

          const books = document.createElement('div');
          books.className = 'books';
          groupItems.forEach(it => books.appendChild(makeBook(it)));

          section.appendChild(books);
          frag.appendChild(section);
        });

        wrap.textContent = '';
        wrap.appendChild(frag);
      },
      error: err=>{
        console.error(err);
        document.getElementById('books').innerHTML = '<p class="load-error">データ読み込みに失敗しました。</p>';
      }
    });
  </script>
</body>
</html>
