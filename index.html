<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>気分で選ばない読書地図 – すやネコ文庫</title>
<meta name="description" content="気分に頼らず、客観指標で読みたい本を探す『読書地図』。作品カードやデータへの入り口。">
<style>
  :root{
    --bg:#f7f3ee; --paper:#fffaf4; --card:#fff; --ink:#2b211a; --sub:#6e6259; --line:#eadfd4; --btnbg:#fff8ef;
    --book-w:168px; --book-ratio:2/3;
    --obi-color:#d8c8b8; --obi-thick:8px; --obi-bottom:65%;
    --accent:#6d4b35; --accent-soft:#efe3d8; --gold:#b89467;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",sans-serif;color:var(--ink);background:var(--bg);line-height:1.75}
  a{color:inherit}
  header{padding:0 16px 28px;background:linear-gradient(180deg,#efe3d8 0%,#f7f3ee 76%,transparent 100%)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px}
  .site-nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 0;color:var(--sub);font-size:.92rem}
  .brand{font-family:Georgia,"Times New Roman",serif;letter-spacing:.08em;color:var(--accent);text-decoration:none;font-weight:700}
  .nav-links{display:flex;flex-wrap:wrap;gap:14px}
  .nav-links a{color:var(--sub);text-decoration:none;border-bottom:1px solid transparent}
  .nav-links a:hover{border-bottom-color:var(--accent)}
  .hero-panel{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(240px,.9fr);gap:26px;align-items:center;padding:34px 0 22px}
  .eyebrow{margin:0 0 10px;color:var(--accent);font-family:Georgia,"Times New Roman",serif;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase}
  h1{margin:0 0 12px;font-size:clamp(2.1rem,5vw,4rem);line-height:1.15;letter-spacing:.04em;font-weight:800}
  .tagline{max-width:42em;margin:0;color:var(--sub)}
  .hero{margin-top:24px;display:flex;flex-wrap:wrap;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:.45em;padding:11px 16px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.62);color:var(--ink);text-decoration:none;font-weight:700;box-shadow:0 1px 0 rgba(255,255,255,.8) inset}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fffaf4}
  .hero-visual{position:relative;min-height:250px;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.9),transparent 28%),linear-gradient(145deg,#fff8ef,#e9d9c8);overflow:hidden;box-shadow:0 18px 40px rgba(75,52,35,.10)}
  .hero-visual:before{content:"";position:absolute;left:18%;right:18%;bottom:34px;height:130px;background:repeating-linear-gradient(180deg,transparent 0 18px,rgba(109,75,53,.18) 18px 20px),linear-gradient(120deg,transparent 0 45%,rgba(109,75,53,.18) 46% 54%,transparent 55%);transform:skewX(-14deg);border-bottom:8px solid rgba(109,75,53,.28)}
  .hero-visual:after{content:"READING MAP";position:absolute;right:22px;bottom:18px;color:rgba(109,75,53,.22);font-family:Georgia,"Times New Roman",serif;font-size:.78rem;letter-spacing:.2em}
  main{padding:22px 0 34px}
  .info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:34px}
  .info-card{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:22px 22px 20px;box-shadow:0 8px 24px rgba(75,52,35,.05)}
  .info-card .num{display:block;margin:0 0 10px;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:.96rem;letter-spacing:.18em}
  .info-card h3{margin:0 0 8px;font-size:1.18rem;color:var(--ink)}
  .info-card p{margin:0;color:var(--sub)}
  .work-map{padding:2px 0 0}
  .section-kicker{margin:0 0 6px;color:var(--gold);font-family:Georgia,"Times New Roman",serif;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase}
  .works-title{position:relative;display:flex;align-items:center;gap:10px;margin:0 0 8px;font-size:clamp(1.55rem,3vw,2.1rem);color:var(--ink);letter-spacing:.03em}
  .works-title:before{content:"✦";display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:var(--accent-soft);font-size:1rem;line-height:1;color:var(--accent)}
  .works-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}
  .works-note{margin:0 0 20px;color:var(--sub);font-size:.96rem}
  .author-section{margin:0 0 28px;padding:20px 0 28px;border-top:1px solid var(--line)}
  .author-section:last-child{border-bottom:1px solid var(--line)}
  .author-heading{display:inline-flex;align-items:center;gap:8px;margin:0 0 16px;padding:6px 13px;border-radius:999px;background:var(--paper);border:1px solid var(--line);color:var(--accent);font-size:1rem;font-weight:800;letter-spacing:.12em;box-shadow:0 3px 12px rgba(75,52,35,.04)}
  .author-heading:before{content:"◇";font-size:.8rem;color:var(--gold)}

  /* 表紙カード */
  .books{display:grid;grid-template-columns:repeat(auto-fill, minmax(var(--book-w), var(--book-w)));gap:18px;justify-content:start}
  .book{position:relative;display:block;width:var(--book-w);aspect-ratio:var(--book-ratio);text-decoration:none;color:inherit;background:linear-gradient(90deg,#efe7dc 0 9px,var(--card) 9px);border:1.5px solid var(--line);border-radius:12px;padding:16px 13px 14px 18px;box-shadow:0 10px 22px rgba(75,52,35,.08);transition:transform .12s ease, box-shadow .12s ease, background .2s;overflow:hidden}
  .book:before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:rgba(109,75,53,.14)}
  .book:hover{transform:translateY(-3px);box-shadow:0 14px 26px rgba(75,52,35,.13)}
  .book .title{font-weight:800;font-size:1rem;line-height:1.35;margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .book .author{color:var(--sub);font-size:.9rem;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .book .obi{position:absolute;left:20px;right:12px;bottom:var(--obi-bottom);height:var(--obi-thick);background:var(--obi-color)}
  .book.empty{pointer-events:none}
  .load-error{color:#b00;margin:0}
  footer{padding:28px 16px;color:#8a7a6a;border-top:1px solid var(--line)}

  @media (max-width:760px){
    .site-nav{align-items:flex-start;flex-direction:column}
    .hero-panel{grid-template-columns:1fr;padding-top:22px}
    .hero-visual{min-height:180px}
    .books{grid-template-columns:repeat(auto-fill,minmax(145px,145px))}
    .book{width:145px}
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#0f0e0e;--paper:#151515;--card:#191919;--ink:#eee;--sub:#aaa;--line:#2a2a2a;--btnbg:#1a1a1a;--obi-color:#6a6a6a;--accent:#d9b894;--accent-soft:#211b16;--gold:#caa56f}
    header{background:linear-gradient(180deg,#1a1816,transparent)}
    .btn{background:#151515}.btn.primary{background:#d9b894;color:#18120c}.hero-visual{background:linear-gradient(145deg,#191919,#211b16)}.book{background:linear-gradient(90deg,#27221e 0 9px,var(--card) 9px)}
  }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <nav class="site-nav" aria-label="サイト内ナビゲーション">
        <a class="brand" href="https://esortseld.github.io/suyaneko_bunko/">Suyaneko Bunko</a>
        <div class="nav-links">
          <a href="./">読書地図</a>
          <a href="https://esortseld.github.io/suyaneko_bunko/">すやネコ文庫</a>
          <a href="https://esortseld.github.io/suyaneko_yomikikase/">すやネコ朗読</a>
        </div>
      </nav>

      <div class="hero-panel">
        <div>
          <p class="eyebrow">Reading Map</p>
          <h1>気分で選ばない読書地図</h1>
          <p class="tagline">ページ数・語り・時代・地域など、気分ではなく“情報”を手がかりに本を探す小さなカタログ。</p>
          <div class="hero">
            <a class="btn primary" href="#author-map">作者名から探す</a>
            <a class="btn" href="https://esortseld.github.io/suyaneko_bunko/">すやネコ文庫へ</a>
          </div>
        </div>
        <div class="hero-visual" aria-label="本の階段をイメージした装飾"></div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="info-grid">
      <article class="info-card">
        <span class="num">01</span>
        <h3>読書地図とは</h3>
        <p>客観データ（刊行年・出版社・語り／構造など）で本を探せるように整理しています。</p>
      </article>
      <article class="info-card">
        <span class="num">02</span>
        <h3>作品カード</h3>
        <p>作品ごとの情報と、読書中に見返せる登場人物MAPをまとめます。</p>
      </article>
    </section>

    <section id="author-map" class="work-map" aria-label="作者名から本を見つける地図">
      <p class="section-kicker">Catalog</p>
      <h2 class="works-title">作者名から本を見つける地図</h2>
      <p class="works-note">作者名を手がかりに、次に読む一冊を探します。</p>
      <div id="books"></div>
    </section>
  </main>

  <footer><div class="wrap"><small>© すやネコ文庫 / Reading Map</small></div></footer>

  <!-- CSV読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" crossorigin="anonymous"></script>
  <script>
    const CSV_URL = 'data/works.csv';

    // 列名のゆれ対応（slugは英数字のみを想定）
    const ALIAS = {
      slug:       ['slug','Slug','SLUG'],
      title:      ['title','作品名','書名'],
      author:     ['author','作者','著者'],
      authorYomi: ['author_yomi','作者名よみ','作者よみ','著者名よみ','著者よみ','作者名よみデータ整理用']
    };
    const pick = (row, keys) => {
      for (const k of keys) {
        const v = row[k];
        if (v !== undefined && String(v).trim() !== '') return String(v).trim();
      }
      return '';
    };
    // 英数字以外を除去して正規化（保険）
    const cleanSlug = s => String(s).replace(/[^A-Za-z0-9]/g,'').trim();
    const toHiragana = s => String(s).replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    const groupOf = yomi => {
      const first = toHiragana(yomi).charAt(0);
      if ('あいうえお'.includes(first)) return 'あいうえお';
      if ('かきくけこがぎぐげご'.includes(first)) return 'かきくけこ';
      if ('さしすせそざじずぜぞ'.includes(first)) return 'さしすせそ';
      if ('たちつてとだぢづでど'.includes(first)) return 'たちつてと';
      if ('なにぬねの'.includes(first)) return 'なにぬねの';
      if ('はひふへほばびぶべぼぱぴぷぺぽ'.includes(first)) return 'はひふへほ';
      if ('まみむめも'.includes(first)) return 'まみむめも';
      if ('やゆよ'.includes(first)) return 'やゆよ';
      if ('らりるれろ'.includes(first)) return 'らりるれろ';
      if ('わをん'.includes(first)) return 'わをん';
      return 'その他';
    };
    const GROUPS = ['あいうえお','かきくけこ','さしすせそ','たちつてと','なにぬねの','はひふへほ','まみむめも','やゆよ','らりるれろ','わをん','その他'];

    const makeBook = it => {
      const a = document.createElement('a');
      a.className = 'book';
      a.href = `works/${it.slug}.html`;
      a.innerHTML = `
        <div class="title">${it.title}</div>
        <div class="author">${it.author}</div>
        <div class="obi"></div>
      `;
      return a;
    };

    Papa.parse(CSV_URL, {
      download:true, header:true, skipEmptyLines:true, encoding:'utf-8',
      complete: ({data})=>{
        const items = data.map(r=>({
          slug:       cleanSlug(pick(r, ALIAS.slug)),
          title:      pick(r, ALIAS.title),
          author:     pick(r, ALIAS.author),
          authorYomi: pick(r, ALIAS.authorYomi) || pick(r, ALIAS.author)
        })).filter(x => x.slug && x.title && x.author);

        items.sort((a,b)=>{
          const yomiCompare = a.authorYomi.localeCompare(b.authorYomi, 'ja');
          if (yomiCompare !== 0) return yomiCompare;
          return a.title.localeCompare(b.title, 'ja');
        });

        const wrap = document.getElementById('books');
        const frag = document.createDocumentFragment();

        GROUPS.forEach(groupName => {
          const groupItems = items.filter(it => groupOf(it.authorYomi) === groupName);
          if (!groupItems.length) return;

          const section = document.createElement('section');
          section.className = 'author-section';
          section.innerHTML = `<h3 class="author-heading">${groupName}</h3>`;

          const books = document.createElement('div');
          books.className = 'books';
          groupItems.forEach(it => books.appendChild(makeBook(it)));

          section.appendChild(books);
          frag.appendChild(section);
        });

        wrap.textContent = '';
        wrap.appendChild(frag);
      },
      error: err=>{
        console.error(err);
        document.getElementById('books').innerHTML = '<p class="load-error">データ読み込みに失敗しました。</p>';
      }
    });
  </script>
</body>
</html>
